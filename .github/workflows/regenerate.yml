# Nightly catalog regeneration -- rebuild index.html from
# kotoba-lang/industry's registry (the fleet's machine-readable SSoT),
# verify with the headless harness, and commit only when the catalog
# actually changed (i.e. the registry advanced). Same shape as
# cloud-itonami-isic-6399's regenerate-board workflow.
name: regenerate-catalog
on:
  schedule:
    - cron: '41 17 * * *'   # 02:41 JST nightly (off-minute on purpose)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: cloud-itonami/cloud-itonami.github.io
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/html, path: kotoba-lang/html}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/css, path: kotoba-lang/css}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/industry, path: kotoba-lang/industry}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install nbb
        run: npm install nbb
      - name: regenerate from the registry
        working-directory: cloud-itonami/cloud-itonami.github.io/web
        run: |
          npx nbb \
            --classpath "../../../kotoba-lang/html/src:../../../kotoba-lang/css/src" \
            generate.cljs
      - name: verify (headless harness)
        working-directory: cloud-itonami/cloud-itonami.github.io/web
        run: npx nbb verify_catalog.cljs
      - name: commit when changed
        working-directory: cloud-itonami/cloud-itonami.github.io
        run: |
          if ! git diff --quiet index.html catalog.cljs; then
            git config user.name "regenerate-catalog[bot]"
            git config user.email "noreply@github.com"
            git add index.html catalog.cljs
            git commit -m "chore(catalog): nightly regeneration from the registry"
            git push
          else
            echo "catalog unchanged"
          fi
